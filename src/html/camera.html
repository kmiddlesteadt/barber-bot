<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BarberBot - Capture Your Photo</title>
    <style>
        :root {
            --red: #D62828;
            --blue: #1D4ED8;
            --white: #FFFFFF;
            --cream: #F8F1E7;
            --dark: #1F2937;
        }

        body {
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
            background-color: var(--cream);
            color: var(--dark);
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        header {
            width: 100%;
            display: flex;
            justify-content: center;
            padding: 15px 0;
            background-color: var(--blue);
            border-bottom: 4px solid var(--red);
        }

        .brand-name {
            font-size: 24px;
            font-weight: 800;
            color: var(--white);
        }

        .camera-app-container {
            width: 100%;
            max-width: 500px;
            padding: 20px;
        }

        .camera-wrapper {
            position: relative;
            width: 100%;
            aspect-ratio: 3/4;
            background-color: #000;
            border-radius: 16px;
            overflow: hidden;
            border: 3px solid var(--blue);
            margin-bottom: 20px;
        }

        #webcam {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transform: scaleX(-1);
        }

        .face-guide {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 55%;
            height: 65%;
            border-radius: 50% 50% 45% 45%;
            border: 3px dashed var(--red);
            box-shadow: 0 0 0 9999px rgba(0,0,0,0.5);
        }

        .instructions-panel {
            background-color: var(--white);
            border: 2px solid var(--blue);
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 20px;
        }

        .instructions-list {
            list-style: none;
            padding: 0;
            margin: 0;
            color: var(--dark);
        }

        .controls {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .btn-capture {
            background-color: var(--red);
            color: var(--white);
            border: none;
            padding: 18px;
            font-size: 20px;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
        }

        .btn-capture:hover {
            background-color: #b91c1c;
        }

        .btn-back {
            background: none;
            color: var(--blue);
            border: none;
            font-size: 16px;
            cursor: pointer;
        }

    </style>
</head>
<body>

<header>
    <h2 class="brand-name">💈 BarberBot</h2>
</header>

<div class="camera-app-container">
    
    <div class="camera-wrapper">
        <video id="webcam" autoplay playsinline></video>
        <div class="face-guide"></div>
    </div>

    <div class="instructions-panel">
        <ul class="instructions-list">
            <li>💡 Good lighting</li>
            <li>🧢 Remove hat/glasses</li>
            <li>🎯 Center your face</li>
        </ul>
    </div>

    <div class="controls">
        <button class="btn-capture" id="captureBtn">📸 Capture Photo</button>
        <button class="btn-back" id="backBtn">⬅ Back</button>
    </div>

</div>

<script>
const videoElement = document.getElementById('webcam');
const captureBtn = document.getElementById('captureBtn');
const backBtn = document.getElementById('backBtn');

async function startCamera() {
    try {
        const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } });
        videoElement.srcObject = stream;
    } catch (err) {
        alert("Enable camera access.");
    }
}

window.addEventListener('load', startCamera);

captureBtn.addEventListener('click', () => {
    const canvas = document.createElement('canvas');
    canvas.width = videoElement.videoWidth;
    canvas.height = videoElement.videoHeight;
    const ctx = canvas.getContext('2d');

    ctx.translate(canvas.width, 0);
    ctx.scale(-1, 1);
    ctx.drawImage(videoElement, 0, 0);

    const image = canvas.toDataURL('image/png');
    sessionStorage.setItem('customerPhoto', image);
    window.location.href = 'results.html';
});

backBtn.addEventListener('click', () => {
    const stream = videoElement.srcObject;
    if (stream) stream.getTracks().forEach(t => t.stop());
    window.location.href = 'questionnaire.html';
});
</script>

</body>
</html>
